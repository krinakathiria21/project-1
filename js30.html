<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var n = parseInt(prompt("Enter the number :"))
        var a = 0
        var b = 1
        var c;

        document.write("<h2>fibonacci series</h2>");

        for(var i=1; i<=n;i++)
    {
        document.write( a +"  ");

       c = a + b;
        a = b;
        b = c;
    }
       
    </script>
</body>
</html>
