</head>
<body>
    <script>
     var a = Number(prompt("Enter the value of a :",0));
        var b = Number(prompt("Enter the value of b :",0));
        var c = Number(prompt("Enter the value of c :",0));

        if(a < b && a < c)
    {
        document.write("Min number :" + a);
    }
    else if(b < c)
    {
        document.write("Min number :" + b);
    }
    else
    {
        document.write("Min number :" +c);
    }
    </script>
</body>
