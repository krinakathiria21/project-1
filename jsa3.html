<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter the number of the elements : "))
        let ar1 = [];
        let ar2 = [];

        for( i=0;i<n;i++)
    {
        ar1[i] = prompt("Enter elements" + (i+1) + " : ")
    }

    console.log("Array elements with position ");

    for( i=0;i<n;i++)
    {
        ar2[i] = ar1[i];
    }

    console.log("Copied Array");

    for( i=0;i<=n;i++)
    {
        console.log( ar2[i] )
    }
    </script>
</body>
</html>
