<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
    margin:0;
    background:#86aee5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family: Arial, Helvetica, sans-serif;
}

.calculator{

    background:white;
    width:350px;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px black;
}

input{
    height:40px;
    width:80%;
    padding:12px;
    margin:10px;
    font-size:18px;
}
h2{
    font-size:22px;
}
button{
    width:70px;
    height:70px;
    margin:5px;
    font-size:25px;
    border:none;
    border-radius:10px;
    background:#457b9d;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d3557;
}

.num0{
    width:150px;
    height:70px;
    margin:5px;
    font-size:25px;
    border:none;
    border-radius:10px;
    background:#457b9d;
    color:white;
    cursor:pointer;
}

.answer{
    width:320px;
    height: 100px;
    margin:5px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#457b9d;
    color:white;
    cursor:pointer;

} 

    </style>
</head>
<body>
    <div class="calculator">
    <input type="text" id="display" readonly placeholder="0">

        <button onclick="clearDisplay()">A/C</button>
        <button onclick="operator('+','-')">+/-</button>
        <button onclick="operator('%')">%</button>
        <button onclick="operator('/')">/</button>
        <button onclick="num('7')">7</button>
        <button onclick="num('8')">8</button>
        <button onclick="num('9')">9</button>
        <button onclick="operator('*')">*</button>
        <button onclick="num('4')">4</button>
        <button onclick="num('5')">5</button>
        <button onclick="num('6')">6</button>
        <button onclick="operator('-')">-</button>
        <button onclick="num('1')">1</button>
        <button onclick="num('2')">2</button>
        <button onclick="num('3')">3</button>
        <button onclick="operator('+')">+</button>
        <button class="num0" onclick="num('0')">0</button>
        <button onclick="num('.')">.</button>
        <button onclick="calculate()">=</button>


    </div>
    <script>
        let expression = "";

        function num(value)
    {
    expression += value;

    document.getElementById("display").value = expression;
    }

    function operator(op)
    {
    expression += op;

    document.getElementById("display").value = expression;
    }
    
    function calculate()
{
    let numbers = expression.split(/[\+\-]/);

    let operators = expression.match(/[\+\-]/g);

    let result = Number(numbers[0]);

    if(operators != null)
    {
        for(let i=0;i<operators.length;i++)
        {
            if(operators[i] == "+")
            {
                result = result + Number(numbers[i+1]);
            }
            else if(operators[i] == "-")
            {
                result = result - Number(numbers[i+1]);
            }
        }
    }

    document.getElementById("display").value = result;

    expression = result.toString();
}


    </script>
</body>
</html>
