<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
      var n = parseInt(prompt("Enter the number :"))

        for(i=n;i>=1;i--)
    {
        for(j=1;j<=i;j++)
    {
        if(j % 2 == 1)
    {
        document.write("1")
    }
    else{
        document.write("*")
    }
    }
        document.write("<br>")
    }
    </script>
</body>
</html>
