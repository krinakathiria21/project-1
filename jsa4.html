<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <script>
        let n = parseInt(prompt("Enter the number of the elements : "));
        let ar1 = [];
        let ar2 = [];

        for( i=0;i<n;i++)
    {
        ar1[i] = Number(prompt("Enter the elements :"));
    }

    let j = 0;

    console.log("Array elements with position");

    for( i=n-1;i>=0;i--)
    {
        ar2[j] = ar1[i];
        j++;
    }

    console.log("Reverse Copied Array");

    for(i=0;i<n;i++)
    {
        console.log("the position ar2[" + i + "]: " + ar2[i]);
    }
    </script>
</body>
</html>
