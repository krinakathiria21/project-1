
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#fffcfc;
    font-family:Arial;
}

.container{
    text-align:center;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:10px;
    margin:20px auto;
}

.cell{
    width:100px;
    height:100px;
    font-size:40px;
    border:none;
    cursor:pointer;
    border-radius:10px;
    background:white;
    box-shadow:0px 0px 10px gray;
}

.cell:hover{
    background:#ddd;
}

#message{
    font-size:25px;
    margin-top:20px;
}

button.restart{
    padding:10px 20px;
    font-size:20px;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="container">

<h1>Tic Tac Toe</h1>

<div class="board">

<button class="cell" onclick="play(0)"></button>
<button class="cell" onclick="play(1)"></button>
<button class="cell" onclick="play(2)"></button>

<button class="cell" onclick="play(3)"></button>
<button class="cell" onclick="play(4)"></button>
<button class="cell" onclick="play(5)"></button>

<button class="cell" onclick="play(6)"></button>
<button class="cell" onclick="play(7)"></button>
<button class="cell" onclick="play(8)"></button>

</div>

<h2 id="message">Player X Turn</h2>

<button class="restart" onclick="restartGame()">Restart</button>

</div>

<script>

let board=["","","","","","","","",""];

let currentPlayer="X";

let gameOver=false;

let moveCount=0;

function play(index)
{

    if(gameOver==true)
    {
        return;
    }

    if(board[index]!="")
    {
        return;
    }

    board[index]=currentPlayer;

    let cells=document.getElementsByClassName("cell");

    cells[index].innerHTML=currentPlayer;

    moveCount++;

    checkWinner();

    if(gameOver==false)
    {
        if(currentPlayer=="X")
        {
            currentPlayer="O";
        }
        else
        {
            currentPlayer="X";
        }

        document.getElementById("message").innerHTML="Player "+currentPlayer+" Turn";
    }

}

function checkWinner()
{

    if(board[0]!="" && board[0]==board[1] && board[1]==board[2])
    {
        winner();
    }

    else if(board[3]!="" && board[3]==board[4] && board[4]==board[5])
    {
        winner();
    }

    else if(board[6]!="" && board[6]==board[7] && board[7]==board[8])
    {
        winner();
    }

    else if(board[0]!="" && board[0]==board[3] && board[3]==board[6])
    {
        winner();
    }

    else if(board[1]!="" && board[1]==board[4] && board[4]==board[7])
    {
        winner();
    }

    else if(board[2]!="" && board[2]==board[5] && board[5]==board[8])
    {
        winner();
    }

    else if(board[0]!="" && board[0]==board[4] && board[4]==board[8])
    {
        winner();
    }

    else if(board[2]!="" && board[2]==board[4] && board[4]==board[6])
    {
        winner();
    }

    else if(moveCount==9)
    {
        document.getElementById("message").innerHTML="Game Draw";
        gameOver=true;
    }

}

function winner()
{

    document.getElementById("message").innerHTML="Player "+currentPlayer+" Wins 🎉";

    gameOver=true;

}

function restartGame()
{

    board=["","","","","","","","",""];

    currentPlayer="X";

    gameOver=false;

    moveCount=0;

    let cells=document.getElementsByClassName("cell");

    for(let i=0;i<cells.length;i++)
    {
        cells[i].innerHTML="";
    }

    document.getElementById("message").innerHTML="Player X Turn";

}

</script>

</body>
</html>
