<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var num = parseInt(prompt("Enter the number :"))
        var rev = 0;

        while (num>0)
    {
        var rem = num % 10;
        rev = rev * 10 + rem;
        num = parseInt(num / 10);
    }
    document.write("Reverse number :" + rev);
    </script>
</body>
</html>
