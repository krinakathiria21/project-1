<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = parseInt(prompt("Enter the number of the elements : "))
        let ar = [];

          for(i=0;i<n;i++)
    {
        ar[i] = Number(prompt("Enter the elements :"))
    }

    console.log("Odd numbers :")

    for(i=0;i<n;i++)
    {
        if(i % 2 != 0)
    {
        console.log(ar[i] );
    }
    }

    console.log("Even numbers :")

    for(i=0;i<=n;i++)
    {
        if(i%2==0)
    {
        console.log(ar[i]);
    }
    }
    </script>
</body>
</html>
