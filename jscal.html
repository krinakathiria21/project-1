<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body{
    margin:0;
    background:#86aee5;
    display:flex;
    justify-content:center;
    align-items:center;
   height:100vh;
    font-family: Arial, Helvetica, sans-serif;
}

.calculator{

    background:white;
    width:350px;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px black;
}

input{
    width:90%;
    padding:12px;
    margin:10px;
    font-size:18px;
}
h2{
    font-size:22px;
}
button{
    width:70px;
    height:50px;
    margin:5px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#457b9d;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d3557;
}

.answer{
    width:320px;
    height: 100px;
    margin:5px;
    font-size:22px;
    border:none;
    border-radius:10px;
    background:#457b9d;
    color:white;
    cursor:pointer;

}

    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="num1" placeholder="Enter first number" onfocus="selectinput('num1')">
        <input type="text" id="num2" placeholder="Enter second number" onfocus="selectinput('num2')">
            <div class = "buttons">
            <button onclick="num('1')">1</button>
            <button onclick="num('2')">2</button>
            <button onclick="num('3')">3</button>
            <button onclick="num('4')">4</button>
            <button onclick="num('5')">5</button>
            <button onclick="num('6')">6</button>
            <button onclick="num('7')">7</button>
            <button onclick="num('8')">8</button>
            <button onclick="num('9')">9</button>
            <button onclick="num('0')">0</button>
            <button onclick="add()">+</button>
            <button onclick="subtract()">-</button>
            <button onclick="multiply()">*</button>
            <button onclick="divide()">/</button>
            <button onclick="modulus()">%</button>
            <button onclick="clearResult()">Clear</button>
            <br>
            <button class="answer"><span> Result: <h2 id="Demo"> 0</h2></span></button>
        </div>

    </div>

    <script>

        let currentInput = "";
        function selectinput(id)
    {
    currentInput = id;
    }
    function num(value)
        {
        if(currentInput == "")
            {
             //alert("Please click on an input box first.");
             return;
            }
            document.getElementById(currentInput).value += value;
        }

        /*function num() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            document.getElementById("num1").innerHTML = num1;
            document.getElementById("num2").innerHTML = num2;
            console.log("the two digits are :", num1, num2);
        }*/

        function add() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let result = num1 + num2;
            console.log("the addition of the two digits :", result);
           
            document.getElementById("Demo").innerHTML = "<p><h1>" + result + "</h1></p>";
        }

        function subtract() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let result = num1 - num2;
            console.log("the subtraction of the two digits :", result);
            document.getElementById("Demo").innerHTML = "<p><h1>" + result + "</h1></p>";
        }

        function multiply() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let result = num1 * num2;
            console.log("the multiplication of the two digits :", result);
            document.getElementById("Demo").innerHTML = "<p><h1>" + result + "</h1></p>";
        }

        function divide() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            if (num2 !== 0) {
                let result = num1 / num2;
               console.log("the division of the two digits :", result);
                document.getElementById("Demo").innerHTML = "<p><h1>" + result + "</h1></p>";
            } else {
                document.getElementById("Demo").innerHTML = "<p><h1>Cannot divide by zero</h1></p>";
            }
        }

        function modulus() {
            let num1 = parseFloat(document.getElementById("num1").value);
            let num2 = parseFloat(document.getElementById("num2").value);
            let result = num1 % num2;
            console.log("the modulus of the two digits :", result);
            document.getElementById("Demo").innerHTML = "<p><h1>" + result + "</h1></p>";
        }

        function clearResult() {
            document.getElementById("Demo").innerHTML = "<p><h1>0</h1></p>";
        }
    </script>
</body>
</html>
