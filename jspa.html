<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <h1>The on click event</h1>
    <input type="text" id="no1" >
    <input type="text" id="no2" >
    <button onclick="myfun()">+</button>
    <button onclick="myfun()">*</button>
    <br>

    <span> Result: <h1 id="Demo"> 0</h1></span>
<script>
    function myfun()
    {

        //document.getElementById("Demo").innerHTML = "Hello World";
        //alert("Hello");
        no1 = document.getElementById("no1").value;
        no2 = document.getElementById("no2").value;
        sm = parseInt(no1) + parseInt(no2);
        
        document.getElementById("no1").value = sm;


        document.getElementById("Demo").innerHTML = "<p><h1>" + sm + "</h1></p>"
    }
    </script>
</body>
</html>
