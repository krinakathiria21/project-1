<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

         var a = Number(prompt("Enter the value of a :",0));
        var b = Number(prompt("Enter the value of b :",0));

        document.write("<br>Before swaping ");
        document.write("<br>A =" + a);
        document.write("<br>B = " + b);

        a = a + b;
        b = a - b;
        a = a - b;

         document.write("<br>After swaping ");
        document.write("<br>A =" + a);
        document.write("<br>B = " + b);


    </script>
</body>
</html>
