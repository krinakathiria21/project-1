<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="js.css">

</head>
<body>
    
    <div class="cnt">

    <div class="box">

    <input type="text" id="txt" readonly>

    <br>

    <button onclick="num(7)">7</button>
    <button onclick="num(8)">8</button>
    <button onclick="num(9)">9</button>
    <button onclick="opt('/')">/</button>

    <br><br>


    <button onclick="num(4)">4</button>
    <button onclick="num(5)">5</button>
    <button onclick="num(6)">6</button>
    <button onclick="opt('*')">x</button>

    <br><br>

    <button onclick="num(1)">1</button>
    <button onclick="num(2)">2</button>
    <button onclick="num(3)">3</button>
    <button onclick="opt('-')">-</button>

    <br><br>

    <button onclick="num(0)">0</button>
    <button onclick="opt('%')">%</button>
    <button onclick="clr()">C</button>
    <button onclick="opt('+')">+</button>

    <br><br>
    <!-- <button style="width:220px;" onclick="clr()">C</button> -->
    <button style="width:220px;" onclick="equal()">=</button>


    <br>

    </div>
    </div>





    <script>


    n1="";
    n2="";
    type="";
    ans=0;

    function num(x)
    {
        if(type=="")
        {
            n1=n1+x;
            document.getElementById("txt").value=n1;
        }
        else
        {
            n2=n2+x;
            document.getElementById("txt").value=n1+type+n2;
        }
    }

    function opt(x)
    {
        if(n1!="")
        {
            type=x;
            document.getElementById("txt").value=n1+type;
        }
    }

    function equal()
    {

        if(type=="+")
        {
            ans=parseInt(n1)+parseInt(n2);
        }

        else if(type=="-")
        {
            ans=parseInt(n1)-parseInt(n2);
        }

        else if(type=="*")
        {
            ans=parseInt(n1)*parseInt(n2);
        }

        else if(type=="/")
        {
            ans=parseInt(n1)/parseInt(n2);
        }

        else if(type=="%")
        {
            ans=parseInt(n1)%parseInt(n2);
        }

        document.getElementById("txt").value=ans;

        n1=ans;
        n2="";
        type="";
    }

    function clr()
    {
        n1="";
        n2="";
        type="";
        ans=0;

        document.getElementById("txt").value="";
    }


    </script>



</body>
</html>
