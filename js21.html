<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var fact =1;

        var n = parseInt(prompt("Enter the number :"));

        for(i=1;i<=n;i++)
    {
            fact = fact * i;

    }
    document.write("enter the factorial number :"  +fact);
    </script>
</body>
</html>
