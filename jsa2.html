     <script>
        let n = parseInt(prompt("Enter the number of the elements : "))
        let ar = [];

    {

    }
    console.log("Array elements with position ");

    for( i=n-1;i>=0;i--)
    {
        console.log( ar[i] )
    }
    </script>
