<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var n = parseInt(prompt("Enter the number :"))
        var count = 0;

        for(var i=1;i<=n;i++)
    {
        if(n%i==0)
    {
        count++;
    }
    }
    if(count==2)
    {
        document.write(n +" is the prime number")
    }
    else{
        document.write(n + "is the not prime number")
    }
    </script>
</body>
</html>
