<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         var a = Number(prompt("Enter the value of a :",0));
        var b = Number(prompt("Enter the value of b :",0));
        var c = Number(prompt("Enter the value of c :",0));

        if(a > b && a > c)
    {
        document.write("Max number :" + a);
    }
    else if(b > c)
    {
        document.write("Max number :" + b);
    }
    else
    {
        document.write("Max number :" +c);
    }

    </script>
</body>
</html>
